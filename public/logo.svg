<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="90" fill="url(#shine)"/>

  <!-- Car body -->
  <path d="M 52 430 L 70 372 L 120 348 L 392 348 L 442 372 L 460 430 Z"
    fill="white" opacity="0.95"/>

  <!-- Car cabin -->
  <path d="M 148 348 L 174 278 L 208 256 L 310 256 L 344 278 L 368 348 Z"
    fill="white" opacity="0.95"/>

  <!-- Tinted windows -->
  <path d="M 186 346 L 210 284 L 308 284 L 334 346 Z"
    fill="#1d4ed8" opacity="0.55"/>

  <!-- Left wheel -->
  <circle cx="158" cy="432" r="50" fill="url(#bg)"/>
  <circle cx="158" cy="432" r="33" fill="white" opacity="0.13"/>
  <circle cx="158" cy="432" r="13" fill="white" opacity="0.55"/>

  <!-- Right wheel -->
  <circle cx="356" cy="432" r="50" fill="url(#bg)"/>
  <circle cx="356" cy="432" r="33" fill="white" opacity="0.13"/>
  <circle cx="356" cy="432" r="13" fill="white" opacity="0.55"/>

  <!-- Headlight -->
  <rect x="56" y="382" width="26" height="12" rx="6" fill="white" opacity="0.7"/>
  <!-- Rear light -->
  <rect x="430" y="382" width="26" height="12" rx="6" fill="white" opacity="0.35"/>

  <!-- Tick / pass mark — top right -->
  <circle cx="390" cy="122" r="62" fill="rgba(255,255,255,0.15)"/>
  <polyline points="358,122 380,146 424,98"
    fill="none" stroke="white" stroke-width="18"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
